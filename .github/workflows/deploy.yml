name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy dist --project-name=water-system --branch=main

      - name: Wait for Pages deployment to propagate
        run: sleep 15

      - name: Purge Cloudflare CDN cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=share-fun.org" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"
          if [ "$ZONE_ID" != "null" ] && [ -n "$ZONE_ID" ]; then
            # Purge all CDN cache
            RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}')
            echo "$RESULT"
            if echo "$RESULT" | jq -e '.success' > /dev/null 2>&1; then
              echo "Cache purged successfully"
            else
              echo "Warning: Cache purge may have failed"
            fi
          else
            echo "Warning: Could not find zone ID, skipping cache purge"
          fi

